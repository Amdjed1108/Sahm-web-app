<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHM — Doctor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EAECF0;--surface:#FFFFFF;--s2:#F9FAFB;--s3:#F3F4F6;
  --border:#E5E7EB;--border2:#D1D5DB;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-md:0 8px 24px rgba(0,0,0,.1),0 3px 8px rgba(0,0,0,.06);
  --shadow-xl:0 20px 60px rgba(0,0,0,.18),0 8px 20px rgba(0,0,0,.08);
  --crit:#DC2626;--crit-mid:#EF4444;--crit-bg:#FEF2F2;--crit-br:#FECACA;
  --urg:#D97706;--urg-mid:#F59E0B;--urg-bg:#FFFBEB;--urg-br:#FDE68A;
  --stab:#059669;--stab-mid:#10B981;--stab-bg:#ECFDF5;--stab-br:#A7F3D0;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-br:#BFDBFE;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-br:#DDD6FE;
  --r:12px;--r-sm:8px;--r-lg:18px;
  --nav-h:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ─── Nav ─── */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);display:flex;align-items:center;padding:0 28px;gap:0;z-index:100}
/* Logo + notification dot */
.nav-brand{display:flex;align-items:center;gap:6px;flex-shrink:0}
.notif-wrap{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
.notif-dot{min-width:8px;height:8px;border-radius:99px;background:#EF4444;animation:notifPulse 2.4s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;line-height:1;transition:min-width .18s,height .18s,padding .18s;padding:0}
.notif-dot.has-count{min-width:16px;height:16px;padding:0 4px}
@keyframes notifPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 7px rgba(239,68,68,0)}}
.nav-logo-text{font-size:14px;font-weight:700;letter-spacing:2.5px;color:var(--text)}
.nav-sep{width:1px;height:20px;background:var(--border);margin:0 14px;flex-shrink:0}
.nav-role{font-size:12px;font-weight:500;color:var(--text2);flex-shrink:0}
/* Notification dropdown */
.notif-dropdown{position:absolute;top:50px;left:-4px;width:300px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-md);z-index:400;display:none}
.notif-dropdown.open{display:block}
.notif-dhead{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;justify-content:space-between}
.notif-clear{font-size:10px;font-weight:600;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:4px;transition:all .12s}
.notif-clear:hover{background:var(--s2);color:var(--text)}
.notif-dlist{max-height:220px;overflow-y:auto}
.notif-item{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;cursor:pointer;transition:background .12s}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--s2)}
.notif-item.unread{background:#FFFBEB}
.notif-item-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.notif-item-icon.alert{background:var(--crit-bg)}
.notif-item-icon.info{background:var(--blue-bg)}
.notif-item-text{flex:1;min-width:0}
.notif-item-from{font-size:11px;font-weight:600;color:var(--text2)}
.notif-item-msg{font-size:12px;color:var(--text);line-height:1.4;margin-top:1px}
.notif-item-time{font-size:10px;color:var(--text3);margin-top:2px}
.notif-empty{padding:20px 14px;text-align:center;font-size:12px;color:var(--text3)}
/* Search */
.nav-search{margin-left:18px;position:relative;flex-shrink:0}
.nav-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.nav-search input{width:210px;height:34px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;padding:0 12px 0 34px;outline:none;transition:border .15s,box-shadow .15s}
.nav-search input::placeholder{color:var(--text3)}
.nav-search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
/* Filter + counts together */
.nav-filter-group{display:flex;align-items:center;gap:8px;margin-left:10px;flex-shrink:0}
.tfilter{display:flex;align-items:center;gap:2px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:3px}
.tf-btn{height:26px;padding:0 11px;border:none;border-radius:6px;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .14s;white-space:nowrap}
.tf-btn:hover{color:var(--text2)}
.tf-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
/* Dot counts inline */
.tc-group{display:flex;align-items:center;gap:6px}
.tc-item{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:700;color:var(--text)}
.tc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tc-slash{font-size:12px;color:var(--border2);margin:0 2px}
.nav-today{font-size:12px;font-weight:400;color:var(--text3)}
.nav-spacer{flex:1}
.nav-btn{height:34px;padding:0 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0;transition:background .15s,box-shadow .15s}
.nav-btn:hover{background:#1d4ed8;box-shadow:0 3px 12px rgba(37,99,235,.35)}
.nav-user{font-size:13px;font-weight:500;color:var(--text);flex-shrink:0;margin-left:14px}
.nav-signout{margin-left:10px;height:28px;padding:0 12px;font-size:12px;font-weight:500;color:var(--text2);background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:all .14s;font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0}
.nav-signout:hover{background:var(--s3);color:var(--text)}

/* ─── Board ─── */
.board{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;display:flex;overflow:hidden}


/* ─── Kanban ─── */
.cols-wrap{flex:1;display:flex;gap:12px;padding:14px 18px;overflow:hidden;min-width:0}
.col{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.col-head{display:flex;align-items:center;gap:8px;padding:0 14px;height:40px;border-bottom:1px solid var(--border);flex-shrink:0}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-dot.waiting{background:var(--blue)}
.col-dot.inprog{background:var(--urg)}
.col-dot.done{background:var(--stab)}
.col-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
.col-count{font-size:11px;color:var(--text3);margin-left:auto;font-weight:600}
.col-body{flex:1;overflow-y:auto;min-height:0}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* patient row */
.prow{display:flex;flex-direction:column;gap:2px;padding:7px 12px 7px 9px;border-bottom:1px solid var(--border);border-left:4px solid transparent;cursor:pointer;transition:background .12s}
.prow:last-child{border-bottom:none}
.prow:hover{background:var(--s2)}
.prow.critical{border-left-color:#DC2626}
.prow.urgent{border-left-color:#D97706}
.prow.stable{border-left-color:#059669}
.prow-top{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.prow-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.prow-ticket{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0}
.prow-bot{display:flex;align-items:center;justify-content:flex-end}
.prow-time{font-size:11px;color:var(--text3)}
/* sub-sections */
.subsec{border-top:1px solid var(--border);flex-shrink:0}
.subsec-toggle{display:flex;align-items:center;gap:6px;width:100%;padding:6px 14px;background:none;border:none;cursor:pointer;transition:background .12s}
.subsec-toggle:hover{background:var(--s2)}
.subsec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.subsec-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.subsec-count{font-size:10.5px;color:var(--text3);margin-left:auto}
.subsec-chev{color:var(--text3);flex-shrink:0;transition:transform .18s}
.subsec-chev.open{transform:rotate(180deg)}
.subsec-body{overflow:hidden;max-height:0;transition:max-height .24s ease}
.subsec-body.open{max-height:2000px}

/* ─── Overlay ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.show{opacity:1;pointer-events:all}

/* ─── Left panel ─── */
.left-panel{position:fixed;left:0;top:var(--nav-h);bottom:0;width:500px;background:var(--surface);z-index:350;transform:translateX(-100%);transition:transform .28s cubic-bezier(.25,.46,.45,.94);box-shadow:4px 0 32px rgba(0,0,0,.14);display:flex;flex-direction:column;overflow:hidden}
.left-panel.open{transform:translateX(0)}
.lphead{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px;background:var(--s2)}
.lp-back{background:none;border:none;cursor:pointer;color:var(--text3);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.lp-back:hover{background:var(--border);color:var(--text)}
.lp-head-info{flex:1;min-width:0}
.lp-title{font-size:13px;font-weight:700;color:var(--text)}
.lp-sub{font-size:11px;color:var(--text3);margin-top:1px}
.lpbody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:0}
.lpbody::-webkit-scrollbar{width:3px}
.lpbody::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.lpfooter{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;background:var(--surface)}
.lp-save{flex:1;height:36px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.lp-save:hover{background:#1d4ed8}
/* read-only fields */
.ro-field{display:flex;flex-direction:column;gap:3px}
.ro-label{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.ro-val{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.ro-empty{font-size:12px;color:var(--text3);font-style:italic}
/* AI block */
.ai-block{background:var(--purple-bg);border:1px solid var(--purple-br);border-radius:var(--r-sm);padding:12px}
.ai-block-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.ai-block-label{font-size:10.5px;font-weight:700;color:var(--purple);letter-spacing:.5px;text-transform:uppercase}
.ai-block-meta{font-size:11px;color:var(--text3)}
.ai-block-text{font-size:12.5px;color:var(--text);line-height:1.65}
/* section */
.lp-sec{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.lp-sec-head{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);cursor:pointer;user-select:none;transition:background .12s}
.lp-sec-head:hover{background:var(--s3)}
.lp-sec-title{font-size:10.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;flex:1}
.lp-sec-chev{color:var(--text3);transition:transform .18s;flex-shrink:0}
.lp-sec-chev.open{transform:rotate(180deg)}
.lp-sec-body{padding:12px;display:flex;flex-direction:column;gap:10px}
.lp-sec-body.hidden{display:none}
/* form */
.dfield{display:flex;flex-direction:column;gap:4px}
.dfield-head{display:flex;align-items:center;justify-content:space-between}
.dfield label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.2px}
.gemini-btn{display:flex;align-items:center;gap:4px;height:20px;padding:0 7px;background:none;border:1px solid var(--border2);border-radius:20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:9.5px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .14s;flex-shrink:0}
.gemini-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.dtextarea{width:100%;padding:9px 11px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;resize:vertical;outline:none;line-height:1.5;transition:border .15s,box-shadow .15s}
.dtextarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);background:#fff}
.dtextarea::placeholder{color:var(--text3)}
.dselect{width:100%;height:36px;padding:0 11px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;outline:none;cursor:pointer;transition:border .15s}
.dselect:focus{border-color:var(--blue)}
.exam-routed{font-size:11px;color:var(--text3);margin-top:3px;min-height:14px}
.urg-row{display:flex;gap:5px}
.urg-btn{flex:1;height:32px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--s2);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.urg-btn.on{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.urg-btn:hover:not(.on){border-color:var(--blue);color:var(--blue)}
.send-btn{height:34px;padding:0 14px;background:var(--purple);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.send-btn:hover{background:#6d28d9}
.med-list{display:flex;flex-direction:column;gap:5px}
.med-row{display:grid;grid-template-columns:1fr 58px 56px 60px 26px;gap:4px;align-items:center}
.med-row input{height:32px;padding:0 8px;width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:var(--text);outline:none;transition:border .15s}
.med-row input:focus{border-color:var(--blue)}
.med-row input::placeholder{color:var(--text3)}
.med-del{width:26px;height:26px;background:none;border:none;cursor:pointer;color:var(--text3);border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.med-del:hover{background:var(--crit-bg);color:var(--crit)}
.med-add-btn{height:32px;width:100%;background:none;border:1.5px dashed var(--border2);border-radius:var(--r-sm);color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.med-add-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ─── Right drawer ─── */
.drawer{position:fixed;top:0;right:0;bottom:0;width:400px;background:var(--surface);box-shadow:var(--shadow-xl);z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.25,.46,.45,.94);overflow:hidden}
.drawer.open{transform:translateX(0)}
.dhead{padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.dhead-row1{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.dhead-name{font-size:16px;font-weight:700;color:var(--text);flex:1;line-height:1.2}
.dhead-close{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px;border-radius:6px;display:flex;align-items:center;transition:all .12s}
.dhead-close:hover{background:var(--s3);color:var(--text)}
.dhead-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.dhead-ticket{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.dhead-sep{color:var(--border2);font-size:11px}
.dhead-room{font-size:12px;color:var(--text2)}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge.critical{background:var(--crit-bg);color:var(--crit);border:1px solid var(--crit-br)}
.badge.urgent{background:var(--urg-bg);color:var(--urg);border:1px solid var(--urg-br)}
.badge.stable{background:var(--stab-bg);color:var(--stab);border:1px solid var(--stab-br)}
.dhead-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.icon-btn{width:30px;height:30px;background:none;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .12s}
.icon-btn:hover{background:var(--s2);color:var(--text)}
.btn-call{height:30px;padding:0 11px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-call:hover{background:#1d4ed8}
.btn-arrived{height:30px;padding:0 11px;background:var(--stab-bg);color:var(--stab);border:1px solid var(--stab-br);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .14s}
.btn-arrived:hover{background:var(--stab-mid);color:#fff;border-color:var(--stab-mid)}
.btn-noshow{height:30px;padding:0 11px;background:var(--crit-bg);color:var(--crit);border:1px solid var(--crit-br);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .14s}
.btn-noshow:hover{background:var(--crit-mid);color:#fff;border-color:var(--crit-mid)}
/* drawer body */
.dbody{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;min-height:0}
.dbody::-webkit-scrollbar{width:3px}
.dbody::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* info card */
.info-card{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.info-card-head{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--s2);cursor:pointer;user-select:none;transition:background .12s}
.info-card-head:hover{background:var(--s3)}
.info-card-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px}
.info-card-chev{color:var(--text3);transition:transform .18s}
.info-card-chev.open{transform:rotate(180deg)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;padding:10px 12px}
.ic-label{font-size:9.5px;font-weight:600;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px}
.ic-val{font-size:12px;font-weight:500;color:var(--text);line-height:1.4}
.ic-val.mono{font-family:'JetBrains Mono',monospace}
/* section heading */
.sec-heading{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
/* consult cards */
.consult-card{border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 11px;background:var(--surface);cursor:pointer;transition:all .14s;display:flex;flex-direction:column;gap:5px}
.consult-card:hover{background:var(--s2);border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.06)}
.consult-card.card-active{border-color:var(--blue);background:var(--blue-bg)}
.cc-top{display:flex;align-items:center;gap:6px}
.cc-date{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text3);flex-shrink:0}
.cc-doctor{font-size:12px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;flex-shrink:0}
.cc-tag.validated{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-br)}
.cc-tag.pending{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-br)}
.cc-tag.completed{background:var(--stab-bg);color:var(--stab);border:1px solid var(--stab-br)}
.cc-tag.inprog{background:var(--urg-bg);color:var(--urg);border:1px solid var(--urg-br)}
.cc-summary{font-size:11.5px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* new consultation btn */
.btn-new-consult{width:100%;height:36px;background:none;border:1.5px dashed var(--border2);border-radius:var(--r-sm);color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-new-consult:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);border-style:solid}

/* ─── New patient panel ─── */
.np-panel{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--surface);box-shadow:var(--shadow-xl);z-index:400;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.25,.46,.45,.94);overflow:hidden}
.np-panel.open{transform:translateX(0)}
.np-head{padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.np-head-title{font-size:15px;font-weight:700;color:var(--text)}
.np-close{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:flex;align-items:center;transition:all .12s}
.np-close:hover{background:var(--s3);color:var(--text)}
.np-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;min-height:0}
.np-body::-webkit-scrollbar{width:3px}
.np-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.np-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.np-submit{flex:1;height:38px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.np-submit:hover{background:#1d4ed8}
.np-cancel{height:38px;padding:0 16px;background:none;border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .14s}
.np-cancel:hover{background:var(--s2)}
/* form field in new patient */
.np-sec{margin-bottom:2px}
.np-sec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.np-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.np-grid.full{grid-template-columns:1fr}
.np-field{display:flex;flex-direction:column;gap:4px}
.np-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.2px}
.np-input{height:36px;padding:0 11px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;outline:none;width:100%;transition:border .15s}
.np-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
.np-input::placeholder{color:var(--text3)}
.np-select{height:36px;padding:0 11px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;outline:none;width:100%;cursor:pointer;transition:border .15s}
.np-select:focus{border-color:var(--blue)}
/* triage selector */
.triage-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.triage-opt{height:36px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--s2);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .14s;color:var(--text2)}
.triage-opt[data-t=critical].on{border-color:var(--crit);color:var(--crit);background:var(--crit-bg)}
.triage-opt[data-t=urgent].on{border-color:var(--urg);color:var(--urg);background:var(--urg-bg)}
.triage-opt[data-t=stable].on{border-color:var(--stab);color:var(--stab);background:var(--stab-bg)}
.triage-opt:hover:not(.on){border-color:var(--border2)}

/* ─── PIN modal ─── */
.modal-bg{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.38);opacity:0;pointer-events:none;transition:opacity .18s}
.modal-bg.show{opacity:1;pointer-events:all}
.pin-card{background:var(--surface);border-radius:var(--r-lg);padding:26px 26px 22px;width:290px;box-shadow:var(--shadow-xl);transform:translateY(8px);transition:transform .18s}
.modal-bg.show .pin-card{transform:translateY(0)}
.pin-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.pin-sub{font-size:11.5px;color:var(--text3);margin-bottom:20px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--border2);transition:all .14s}
.pin-dot.on{background:var(--blue);border-color:var(--blue)}
.pin-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pkey{height:44px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;user-select:none}
.pkey:hover{background:var(--s3)}
.pkey.span2{grid-column:span 2;font-size:11.5px;color:var(--text3);font-weight:500}
.pkey.del{font-size:13px;color:var(--text2)}
/* Log modal */
.log-card{background:var(--surface);border-radius:var(--r-lg);width:500px;max-height:72vh;box-shadow:var(--shadow-xl);display:flex;flex-direction:column;transform:translateY(8px);transition:transform .18s}
.modal-bg.show .log-card{transform:translateY(0)}
.log-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.log-head-title{font-size:14px;font-weight:700;color:var(--text)}
.log-close{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:flex;align-items:center;transition:background .12s}
.log-close:hover{background:var(--s3);color:var(--text)}
.log-body{padding:14px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.log-body::-webkit-scrollbar{width:3px}
.log-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-row{display:flex;gap:10px;align-items:flex-start}
.log-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0;width:36px;padding-top:1px}
.log-who{font-size:11.5px;font-weight:600;color:var(--text2);flex-shrink:0;width:160px}
.log-what{font-size:12px;color:var(--text);line-height:1.4}
</style>
</head>
<body>

<!-- ─── Nav ─── -->
<nav class="nav">
  <div class="nav-brand" style="position:relative">
    <div class="notif-wrap" id="notif-wrap" onclick="toggleNotif()">
      <div class="notif-dot" id="notif-dot"></div>
    </div>
    <span class="nav-logo-text">SAHM</span>
    <!-- dropdown -->
    <div class="notif-dropdown" id="notif-dropdown">
      <div class="notif-dhead">
        Messages

      </div>
      <div class="notif-dlist" id="notif-dlist">
        <div class="notif-empty">No new messages</div>
      </div>
    </div>
  </div>
  <span style="font-size:12px;font-weight:400;color:var(--border2);margin:0 12px;letter-spacing:1px">//</span>
  <div class="nav-role">Doctor · Generalist</div>
  <div class="nav-search">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search patients…" id="search-input">
  </div>
  <!-- filter + counts all together -->
  <div class="nav-filter-group">
    <div class="tfilter" id="tfilter">
      <button class="tf-btn active" data-t="all">All</button>
      <button class="tf-btn" data-t="critical">Critical</button>
      <button class="tf-btn" data-t="urgent">Urgent</button>
      <button class="tf-btn" data-t="stable">Stable</button>
    </div>
    <div class="tc-group">
      <div class="tc-item"><div class="tc-dot" style="background:var(--crit)"></div><span id="cnt-crit">0</span></div>
      <div class="tc-item"><div class="tc-dot" style="background:var(--urg)"></div><span id="cnt-urg">0</span></div>
      <div class="tc-item"><div class="tc-dot" style="background:var(--stab)"></div><span id="cnt-stab">0</span></div>
      <span class="tc-slash">/</span>
      <div class="nav-today" id="nav-today">0 today</div>
    </div>
  </div>
  <div class="nav-spacer"></div>
  <button class="nav-signout">Sign out</button>
</nav>

<!-- ─── Board ─── -->
<div class="board">

  <!-- Kanban -->
  <div class="cols-wrap">

    <!-- Waiting + Did not attend -->
    <div class="col" style="display:flex;flex-direction:column;overflow:hidden">
      <div class="col-head">
        <div class="col-dot waiting"></div>
        <div class="col-title">Waiting</div>
        <div class="col-count" id="c-waiting">0</div>
      </div>
      <div class="col-body" id="b-waiting" style="flex:1;overflow-y:auto"></div>
      <div class="subsec" id="passed-sec" style="display:none">
        <button class="subsec-toggle" id="passed-toggle">
          <span class="subsec-dot" style="background:var(--crit)"></span>
          <span class="subsec-label" style="color:var(--text2)">Did not attend</span>
          <span class="subsec-count" id="c-passed">0</span>
          <svg class="subsec-chev" id="passed-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="subsec-body" id="b-passed"></div>
      </div>
    </div>

    <!-- In Progress: New Result → Pending Exam → Consulting -->
    <div class="col" style="display:flex;flex-direction:column;overflow:hidden">
      <div class="col-head">
        <div class="col-dot inprog"></div>
        <div class="col-title">In Progress</div>
        <div class="col-count" id="c-inprog">0</div>
      </div>
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0" id="inprog-wrap">
        <!-- New result sub-section -->
        <div class="subsec" id="result-sec" style="display:none;flex-shrink:0">
          <button class="subsec-toggle" id="result-toggle">
            <span class="subsec-dot" style="background:var(--purple)"></span>
            <span class="subsec-label" style="color:var(--purple)">New result</span>
            <span class="subsec-count" id="c-result">0</span>
            <svg class="subsec-chev open" id="result-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="subsec-body open" id="b-result"></div>
        </div>
        <!-- Pending exam — middle -->
        <div class="subsec" id="pending-sec" style="display:none;flex-shrink:0">
          <button class="subsec-toggle" id="pending-toggle">
            <span class="subsec-dot" style="background:var(--blue)"></span>
            <span class="subsec-label" style="color:var(--blue)">Pending exam</span>
            <span class="subsec-count" id="c-pending">0</span>
            <svg class="subsec-chev open" id="pending-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="subsec-body open" id="b-pending"></div>
        </div>
        <!-- Regular (in consult, not yet sent for exam) -->
        <div class="subsec" id="regular-sec" style="display:none;flex-shrink:0">
          <button class="subsec-toggle" id="regular-toggle">
            <span class="subsec-dot" style="background:var(--text3)"></span>
            <span class="subsec-label" style="color:var(--text2)">Regular</span>
            <span class="subsec-count" id="c-regular">0</span>
            <svg class="subsec-chev open" id="regular-chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="subsec-body open" id="b-regular"></div>
        </div>
        <!-- Plain consulting -->
        <div id="b-consult" style="flex-shrink:0"></div>
      </div>
    </div>

    <!-- Completed -->
    <div class="col">
      <div class="col-head">
        <div class="col-dot done"></div>
        <div class="col-title">Completed</div>
        <div class="col-count" id="c-completed">0</div>
      </div>
      <div class="col-body" id="b-completed"></div>
    </div>

  </div>
</div>

  <div class="dbody" id="dbody"></div>
</div>

    </div>
  </div>
</div>

<div class="modal-bg" id="log-modal">
  <div class="log-card">
    <div class="log-head">
      <div class="log-head-title">Activity log</div>

</div>

function matchSearch(p){if(!searchQuery)return true;const q=searchQuery.toLowerCase();return p.name.toLowerCase().includes(q)||p.ticket.toLowerCase().includes(q)}

function makeRow(p){
  const d=document.createElement('div');
  d.className=`prow ${p.triage}`;
  d.innerHTML=`<div class="prow-top"><span class="prow-name">${p.name}</span><span class="prow-ticket">${p.ticket}</span></div><div class="prow-bot"><span class="prow-time">${p.time}</span></div>`;
  d.addEventListener('click',()=>openDrawer(p));
  return d;
}

function renderBoard(){
  const cols={waiting:[],result:[],pending:[],regular:[],consult:[],passed:[],completed:[]};
  const tc={critical:0,urgent:0,stable:0};
  PATIENTS.forEach(p=>{
    tc[p.triage]++;
    if(!matchSearch(p))return;
    if(triageFilter!=='all'&&p.triage!==triageFilter)return;
    if(p.status==='waiting')cols.waiting.push(p);
    else if(p.status==='passed')cols.passed.push(p);
    else if(p.status==='completed')cols.completed.push(p);
    else if(p.exam==='result')cols.result.push(p);
    else if(p.exam==='pending')cols.pending.push(p);
    else if(!p.consultations||!p.consultations.some(c=>c.exam))cols.regular.push(p);
    else cols.consult.push(p);
  });
  const fill=(id,arr)=>{const el=document.getElementById(id);el.innerHTML='';arr.forEach(p=>el.appendChild(makeRow(p)));};
  fill('b-waiting',cols.waiting);document.getElementById('c-waiting').textContent=cols.waiting.length;
  fill('b-result',cols.result);fill('b-pending',cols.pending);fill('b-regular',cols.regular);fill('b-consult',cols.consult);
  const ip=cols.result.length+cols.pending.length+cols.regular.length+cols.consult.length;
  document.getElementById('c-inprog').textContent=ip;
  document.getElementById('c-result').textContent=cols.result.length;
  document.getElementById('c-pending').textContent=cols.pending.length;
  document.getElementById('c-regular').textContent=cols.regular.length;
  document.getElementById('result-sec').style.display=cols.result.length?'':'none';
  document.getElementById('pending-sec').style.display=cols.pending.length?'':'none';
  document.getElementById('regular-sec').style.display=cols.regular.length?'':'none';
  fill('b-completed',cols.completed);document.getElementById('c-completed').textContent=cols.completed.length;
  fill('b-passed',cols.passed);document.getElementById('c-passed').textContent=cols.passed.length;
  document.getElementById('passed-sec').style.display=cols.passed.length?'':'none';
  document.getElementById('cnt-crit').textContent=tc.critical;
  document.getElementById('cnt-urg').textContent=tc.urgent;
  document.getElementById('cnt-stab').textContent=tc.stable;
  document.getElementById('nav-today').textContent=PATIENTS.length+' today';
}

/* ─── Staff ─── */
const PLetter={morning:'M',evening:'E',night:'N'};
function renderStaff(){
  const body=document.getElementById('staff-body');
  body.innerHTML='';
  const groups=['Doctors','Secretaries','Specialists'];
  const activeMembers=STAFF.filter(s=>s.isActive);
  const offMembers=STAFF.filter(s=>!s.isActive);
  if(staffMode==='shift'){
    groups.forEach(role=>{
      const members=activeMembers.filter(s=>s.role===role);
      if(!members.length)return;
      const lbl=document.createElement('div');lbl.className='s-group-label';lbl.textContent=role;
      body.appendChild(lbl);
      members.forEach(m=>{
        const row=document.createElement('div');row.className='s-row';
        row.innerHTML=`<span class="s-presence on"></span><span class="s-name on">${m.name}</span><span class="pbadge ${PLetter[m.period]}">${PLetter[m.period]}</span>`;
        body.appendChild(row);
      });
    });
    /* compact off-shift collapsible */
    if(offMembers.length){
      const sec=document.createElement('div');sec.className='s-offshift';
      sec.innerHTML=`<button class="s-offshift-toggle" id="off-toggle" onclick="toggleOffShift(this)">
        <span class="s-offshift-label">Off shift</span>
        <span class="s-offshift-count">${offMembers.length}</span>
        <svg class="s-offshift-chev" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="s-offshift-body" id="off-body">
        ${offMembers.map(m=>`<div class="s-row"><span class="s-presence off"></span><span class="s-name off">${m.name}</span><span class="pbadge ${PLetter[m.period]}x">${PLetter[m.period]}</span></div>`).join('')}
      </div>`;
      body.appendChild(sec);
    }
  } else {
    groups.forEach(role=>{
      const members=STAFF.filter(s=>s.role===role);
      if(!members.length)return;
      const lbl=document.createElement('div');lbl.className='s-group-label';lbl.textContent=role;body.appendChild(lbl);
      members.forEach(m=>{
        const row=document.createElement('div');row.className='s-row';
        row.innerHTML=`<span class="s-presence ${m.isActive?'on':'off'}"></span><span class="s-name ${m.isActive?'on':'off'}">${m.name}</span><span class="pbadge ${m.isActive?PLetter[m.period]:PLetter[m.period]+'x'}">${PLetter[m.period]}</span>`;
        body.appendChild(row);
      });
    });
  }
}

function renderNotif(){

  if(unread.length){
    dot.classList.add('has-count');
    dot.textContent=unread.length;
  } else {
    dot.classList.remove('has-count');
    dot.textContent='';
  }
  /* render list */
  const list=document.getElementById('notif-dlist');
  if(!NOTIF_MSGS.length){list.innerHTML='<div class="notif-empty">No messages from admin</div>';return;}
  list.innerHTML='';
  NOTIF_MSGS.forEach(m=>{
    const item=document.createElement('div');
    item.className=`notif-item${!m.read?' unread':''}`;
    item.innerHTML=`<div class="notif-item-icon ${m.type}">

      <div class="notif-item-msg">${m.msg}</div>
      <div class="notif-item-time">${m.time}</div>
    </div>`;
    item.onclick=()=>{m.read=true;renderNotif();};
    list.appendChild(item);
  });
}

function makeConsultCard(p,c){
  const card=document.createElement('div');
  card.className=`consult-card${activeConsultId===c.id?' card-active':''}`;

  let tagHtml='';
  if(c.exam){if(c.exam.status==='validated')tagHtml=`<span class="cc-tag validated">${c.exam.type}</span>`;else if(c.exam.status==='pending')tagHtml=`<span class="cc-tag pending">${c.exam.type}</span>`;}
  if(!tagHtml)tagHtml=c.status==='completed'?`<span class="cc-tag completed">Done</span>`:`<span class="cc-tag inprog">Active</span>`;
  const snip=c.interrogation.slice(0,85)+(c.interrogation.length>85?'…':'');
  card.innerHTML=`<div class="cc-top"><span class="cc-date">${c.date}</span><span class="cc-doctor">${c.doctor}</span>${tagHtml}</div><div class="cc-summary">${snip}</div>`;
  card.addEventListener('click',()=>{if(c.status==='in-progress')openLeftForm(p,c);else openLeftDetail(p,c);});
  return card;
}

      <option value="Chest X-ray" data-s="Radiology">Chest X-ray</option><option value="CT scan" data-s="Radiology">CT scan</option><option value="MRI" data-s="Radiology">MRI</option><option value="Ultrasound" data-s="Radiology">Ultrasound</option>
      <option value="Echocardiogram" data-s="Cardiology">Echocardiogram</option><option value="Holter Monitor" data-s="Cardiology">Holter Monitor</option><option value="Stress test" data-s="Cardiology">Stress test</option>
      <option value="Blood panel" data-s="Biology">Blood panel</option><option value="Urinalysis" data-s="Biology">Urinalysis</option><option value="Blood culture" data-s="Biology">Blood culture</option><option value="Coagulation screen" data-s="Biology">Coagulation screen</option>
      <option value="EEG" data-s="Neurology">EEG</option><option value="Brain MRI" data-s="Neurology">Brain MRI</option><option value="Lumbar puncture" data-s="Neurology">Lumbar puncture</option>
    </select>
    <div class="exam-routed" id="lp-exam-routed"></div>
    <div class="urg-row"><button class="urg-btn" data-u="critical">Critical</button><button class="urg-btn" data-u="urgent">Urgent</button><button class="urg-btn on" data-u="routine">Routine</button></div>
    <div class="dfield" style="margin-top:6px"><label>Notes for specialist</label><textarea class="dtextarea" rows="2" placeholder="Clinical context, specific concerns…"></textarea></div>
    <button class="send-btn" onclick="openPin('exam')">Send request</button>`));
  body.appendChild(makeLpSec('Ordonnance',false,`
    <select class="dselect"><option>Dr. Reda Mansour</option><option>Dr. Amina Khelifa</option></select>
    <div class="med-list" id="lp-meds"><div class="med-row"><input placeholder="Medication"><input placeholder="Dose"><input placeholder="Freq."><input placeholder="Duration"><button class="med-del" onclick="this.closest('.med-row').remove()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div></div>
    <button class="med-add-btn" onclick="addMed()">+ Add medication</button>`));
  body.querySelectorAll('.urg-btn').forEach(btn=>{btn.addEventListener('click',()=>{body.querySelectorAll('.urg-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');});});
  document.getElementById('left-panel').classList.add('open');
}

function makeLpSec(title,open,html){
  const s=document.createElement('div');s.className='lp-sec';
  s.innerHTML=`<div class="lp-sec-head" onclick="toggleLpSec(this)"><span class="lp-sec-title">${title}</span><svg class="lp-sec-chev ${open?'open':''}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div><div class="lp-sec-body${open?'':' hidden'}">${html}</div>`;
  return s;
}

function toggleLpSec(head){const body=head.nextElementSibling;const open=!body.classList.contains('hidden');body.classList.toggle('hidden',open);head.querySelector('.lp-sec-chev').classList.toggle('open',!open);}
function onExamChange(){const sel=document.getElementById('lp-exam');const opt=sel.options[sel.selectedIndex];const s=opt.dataset.s;document.getElementById('lp-exam-routed').textContent=s?`Routes to: ${s}`:'';updateLpSave(!!sel.value);}
function updateLpSave(hasExam){const btn=document.getElementById('lp-save-btn');if(btn)btn.textContent=hasExam?'Save file & send request':'Save file';}
function syncCardActive(){document.querySelectorAll('.consult-card').forEach(c=>c.classList.toggle('card-active',c.dataset.cid===activeConsultId));}
function closeLeft(){document.getElementById('left-panel').classList.remove('open');activeConsultId=null;document.querySelectorAll('.consult-card').forEach(c=>c.classList.remove('card-active'));}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('show');closeLeft();}

/* ─── Gemini mock ─── */
async function formatNote(btn,taId){
  const ta=document.getElementById(taId);if(!ta||!ta.value.trim())return;
  btn.classList.add('loading');btn.textContent='…';
  await new Promise(r=>setTimeout(r,900));
  ta.value=ta.value.trim().split(/\n+/).map(l=>l.trim()).filter(Boolean).join('\n');
  btn.classList.remove('loading');
  btn.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Format`;
}

function addMed(){
  const list=document.getElementById('lp-meds');if(!list)return;
  const row=document.createElement('div');row.className='med-row';
  row.innerHTML=`<input placeholder="Medication"><input placeholder="Dose"><input placeholder="Freq."><input placeholder="Duration"><button class="med-del" onclick="this.closest('.med-row').remove()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
  list.appendChild(row);
}

/* ─── Ticket buttons ─── */
document.getElementById('btn-call-ticket').addEventListener('click',()=>{if(!currentPatient)return;currentPatient.ticketCalled=true;document.getElementById('ticket-default').style.display='none';document.getElementById('ticket-called').style.display='flex';});
document.getElementById('btn-arrived').addEventListener('click',()=>{if(!currentPatient)return;currentPatient.ticketCalled=false;currentPatient.status='in-consult';renderBoard();closeDrawer();});
document.getElementById('btn-noshow').addEventListener('click',()=>{if(!currentPatient)return;currentPatient.ticketCalled=false;currentPatient.status='passed';renderBoard();closeDrawer();});

/* ─── Overlays + close ─── */
document.getElementById('close-drawer').addEventListener('click',closeDrawer);
document.getElementById('overlay').addEventListener('click',()=>{closeDrawer();});
document.getElementById('lp-back').addEventListener('click',closeLeft);

/* ─── Activity log ─── */
document.getElementById('open-log').addEventListener('click',()=>{
  if(!currentPatient)return;
  const body=document.getElementById('log-body');body.innerHTML='';
  currentPatient.log.forEach(e=>{const row=document.createElement('div');row.className='log-row';row.innerHTML=`<div class="log-time">${e.time}</div><div class="log-who">${e.who}</div><div class="log-what">${e.what}</div>`;body.appendChild(row);});
  document.getElementById('log-modal').classList.add('show');
});
document.getElementById('close-log').addEventListener('click',()=>document.getElementById('log-modal').classList.remove('show'));

/* ─── PIN ─── */
let pinVal='',pinAction='';
function openPin(a){pinAction=a;pinVal='';updateDots();document.getElementById('pin-modal').classList.add('show');}
function closePin(){document.getElementById('pin-modal').classList.remove('show');}
function pinTap(n){if(pinVal.length>=4)return;pinVal+=n;updateDots();if(pinVal.length===4)setTimeout(()=>closePin(),320);}
function pinDel(){pinVal=pinVal.slice(0,-1);updateDots();}
function updateDots(){for(let i=0;i<4;i++)document.getElementById(`pd${i}`).classList.toggle('on',i<pinVal.length);}

/* ─── Init ─── */
renderBoard();
renderStaff();
renderNotif();
</script>
</body>
</html>
