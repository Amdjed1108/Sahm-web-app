<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHM — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EAECF0;--surface:#FFFFFF;--s2:#F9FAFB;--s3:#F3F4F6;
  --border:#E5E7EB;--border2:#D1D5DB;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-md:0 8px 24px rgba(0,0,0,.1),0 3px 8px rgba(0,0,0,.06);
  --shadow-xl:0 20px 60px rgba(0,0,0,.18),0 8px 20px rgba(0,0,0,.08);
  --crit:#DC2626;--crit-bg:#FEF2F2;--crit-br:#FECACA;
  --urg:#D97706;--urg-bg:#FFFBEB;--urg-br:#FDE68A;
  --stab:#059669;--stab-bg:#ECFDF5;--stab-br:#A7F3D0;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-br:#BFDBFE;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-br:#DDD6FE;
  --navy:#0C1520;
  --r:12px;--r-sm:8px;--r-lg:18px;
  --nav-h:58px;
  --side-w:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ─── Nav ─── */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--navy);display:flex;align-items:center;padding:0 28px;z-index:100;gap:0}
.nav-brand{display:flex;align-items:center;gap:8px}
.nav-logo-dot{width:7px;height:7px;background:#EF4444;border-radius:50%;animation:vPulse 2.4s ease-in-out infinite}
@keyframes vPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 7px rgba(239,68,68,0)}}
.nav-logo{font-size:14px;font-weight:700;letter-spacing:2.5px;color:#fff}
.nav-divider{width:1px;height:18px;background:rgba(255,255,255,.12);margin:0 16px}
.nav-role{font-size:12px;font-weight:500;color:rgba(255,255,255,.5)}
.nav-spacer{flex:1}
.nav-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.12);letter-spacing:.5px;text-transform:uppercase;margin-right:14px}
.nav-user{font-size:13px;font-weight:500;color:rgba(255,255,255,.85);margin-right:14px}
.nav-signout{margin-left:4px;height:28px;padding:0 12px;font-size:12px;font-weight:500;color:rgba(255,255,255,.55);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);cursor:pointer;transition:all .14s;font-family:'Plus Jakarta Sans',sans-serif;flex-shrink:0}
.nav-signout:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.9)}

/* ─── Layout ─── */
.layout{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;display:flex;overflow:hidden}

/* ─── Sidebar ─── */
.sidebar{width:var(--side-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-section{padding:16px 12px 8px;font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r-sm);cursor:pointer;transition:all .14s;margin:1px 8px;text-decoration:none}
.sb-item:hover{background:var(--s2)}
.sb-item.active{background:var(--blue-bg);color:var(--blue)}
.sb-item.active .sb-icon{color:var(--blue)}
.sb-item.active .sb-label{color:var(--blue);font-weight:600}
.sb-icon{color:var(--text3);flex-shrink:0;transition:color .14s}
.sb-item:hover .sb-icon{color:var(--text2)}
.sb-label{font-size:13px;font-weight:500;color:var(--text);transition:color .14s}
.sb-item:hover .sb-label{color:var(--text)}
.sb-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--crit-bg);color:var(--crit);padding:2px 7px;border-radius:10px}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border)}
.sf-card{background:var(--s2);border-radius:var(--r-sm);padding:10px 12px}
.sf-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sf-val{font-size:13px;font-weight:600;color:var(--text)}
.sf-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* ─── Main content ─── */
.main{flex:1;overflow-y:auto;padding:24px 28px;min-width:0}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* page title */
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:22px}

/* ─── Stat cards ─── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:6px}
.stat-card-top{display:flex;align-items:center;justify-content:space-between}
.stat-icon{width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-trend{font-size:11px;font-weight:600;color:var(--stab)}
.stat-val{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.stat-label{font-size:12px;color:var(--text3)}

/* ─── Section cards ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.card-sub{font-size:12px;color:var(--text3);margin-top:1px}
.card-actions{display:flex;align-items:center;gap:8px}
/* table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:9px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{font-size:13px;color:var(--text);padding:10px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--s2)}
/* buttons */
.btn-primary{height:34px;padding:0 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:6px}
.btn-primary:hover{background:#1d4ed8}
.btn-ghost{height:32px;padding:0 12px;background:none;border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .14s}
.btn-ghost:hover{background:var(--s2);color:var(--text)}
.btn-sm{height:28px;padding:0 10px;background:var(--s2);border:1px solid var(--border);border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11.5px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s}
.btn-sm:hover{background:var(--s3);color:var(--text)}
.btn-sm.red{background:var(--crit-bg);border-color:var(--crit-br);color:var(--crit)}
.btn-sm.red:hover{background:var(--crit);color:#fff}
/* badges */
.role-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:12px}
.role-badge.doctor{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-br)}
.role-badge.secretary{background:var(--stab-bg);color:var(--stab);border:1px solid var(--stab-br)}
.role-badge.specialist{background:var(--crit-bg);color:var(--crit);border:1px solid var(--crit-br)}
.role-badge.admin{background:var(--navy);color:#fff}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.status-dot.on{background:#10B981}
.status-dot.off{background:var(--border2)}
/* input */
.field-input{height:36px;padding:0 11px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border .15s}
.field-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
.field-input::placeholder{color:var(--text3)}
.field-select{height:36px;padding:0 11px;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;width:100%;cursor:pointer}
.field-select:focus{border-color:var(--blue)}
.field-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block}
.field-wrap{display:flex;flex-direction:column;gap:1px;margin-bottom:12px}
/* log */
.log-entry{display:flex;align-items:flex-start;gap:10px;padding:9px 18px;border-bottom:1px solid var(--border);transition:background .12s}
.log-entry:last-child{border-bottom:none}
.log-entry:hover{background:var(--s2)}
.log-ts{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0;width:44px;padding-top:2px}
.log-who-wrap{flex-shrink:0;width:160px}
.log-who-name{font-size:12px;font-weight:600;color:var(--text)}
.log-who-role{font-size:10.5px;color:var(--text3)}
.log-action{font-size:12.5px;color:var(--text);flex:1;line-height:1.4}
.log-patient{font-size:11.5px;color:var(--text3);flex-shrink:0;width:110px;font-style:italic}
.log-type-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
/* presence grid */
.presence-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:14px 18px}
.pres-card{border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;display:flex;align-items:center;gap:10px;background:var(--surface)}
.pres-card.active{border-color:#10B981;background:var(--stab-bg)}
.pres-card.inactive{opacity:.6}
.pres-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.pres-info{flex:1;min-width:0}
.pres-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pres-meta{font-size:11px;color:var(--text3);margin-top:1px}
.pres-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pres-dot.on{background:#10B981;box-shadow:0 0 0 2px rgba(16,185,129,.25)}
.pres-dot.off{background:var(--border2)}
/* messages */
.msg-compose{background:var(--s2);border-radius:var(--r-sm);padding:16px;margin-bottom:16px}
.msg-compose-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.msg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.msg-row.full{grid-template-columns:1fr}
.msg-textarea{width:100%;padding:9px 11px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;resize:none;outline:none;line-height:1.5;transition:border .15s;height:80px}
.msg-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.msg-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:8px}
.msg-type-row{display:flex;gap:6px}
.msg-type-btn{flex:1;height:34px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--surface);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.msg-type-btn.on.alert{border-color:var(--crit);color:var(--crit);background:var(--crit-bg)}
.msg-type-btn.on.info{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
/* sent messages list */
.sent-msg{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
.sent-msg:last-child{border-bottom:none}
.sent-msg-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.sent-msg-icon.alert{background:var(--crit-bg)}
.sent-msg-icon.info{background:var(--blue-bg)}
.sent-msg-body{flex:1;min-width:0}
.sent-msg-meta{font-size:11px;color:var(--text3);margin-bottom:2px}
.sent-msg-text{font-size:13px;color:var(--text);line-height:1.4}
.sent-msg-reads{font-size:11px;color:var(--text3);margin-top:3px}
/* filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-input{height:32px;padding:0 10px 0 32px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;color:var(--text);outline:none;transition:border .15s;flex:1;min-width:180px;position:relative}
.filter-input:focus{border-color:var(--blue)}
.filter-wrap{position:relative;flex:1;min-width:180px}
.filter-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.ftag{height:28px;padding:0 11px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:'Plus Jakarta Sans',sans-serif;font-size:11.5px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .13s;white-space:nowrap}
.ftag:hover{border-color:var(--blue);color:var(--blue)}
.ftag.on{background:var(--blue);border-color:var(--blue);color:#fff}
/* modal */
.modal-bg{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.38);opacity:0;pointer-events:none;transition:opacity .18s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal-card{background:var(--surface);border-radius:var(--r-lg);width:460px;max-height:80vh;box-shadow:var(--shadow-xl);display:flex;flex-direction:column;transform:translateY(8px);transition:transform .18s;overflow:hidden}
.modal-bg.show .modal-card{transform:translateY(0)}
.modal-head{padding:18px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:flex;align-items:center;transition:background .12s}
.modal-close:hover{background:var(--s3)}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
/* staff grid */
.staff-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* icon action buttons */
.icon-action{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;color:var(--text2);flex-shrink:0}
.icon-action:hover{background:var(--s2)}
.icon-action.edit:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.icon-action.view:hover{border-color:var(--stab);color:var(--stab);background:var(--stab-bg)}
.icon-action.del:hover{border-color:var(--crit);color:var(--crit);background:var(--crit-bg)}
/* view staff read-only */
.ro-field{display:flex;flex-direction:column;gap:3px}
.ro-label-sm{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.ro-val-sm{font-size:13px;color:var(--text);line-height:1.5}
/* msg mode toggle */
.msg-mode-row{display:flex;gap:6px;margin-bottom:12px}
.msg-mode-btn{flex:1;height:32px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--surface);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .14s}
.msg-mode-btn.on{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
/* section divider */
.section-divider{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding-bottom:8px;margin-bottom:4px;border-bottom:1px solid var(--border);margin-top:4px}
</style>
</head>
<body>

<!-- ─── Nav ─── -->
<nav class="nav">
  <div style="position:relative;display:flex;align-items:center;gap:8px;flex-shrink:0">
    <div class="notif-wrap" id="notif-wrap" onclick="toggleNotif()" style="cursor:pointer;display:flex;align-items:center;justify-content:center">
      <div class="notif-dot" id="notif-dot" style="min-width:8px;height:8px;border-radius:99px;background:#EF4444;animation:vPulse 2.4s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;line-height:1;transition:min-width .18s,height .18s,padding .18s;padding:0"></div>
    </div>
    <span class="nav-logo">SAHM</span>
    <div id="notif-dropdown" style="position:absolute;top:48px;left:-4px;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-md);z-index:400;display:none">
      <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;justify-content:space-between">
        System alerts <button onclick="clearNotifs(event)" style="font-size:10px;font-weight:600;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:4px">Clear all</button>
      </div>
      <div id="notif-dlist" style="max-height:240px;overflow-y:auto"></div>
    </div>
  </div>
  <div class="nav-divider"></div>
  <span class="nav-role">Director · Admin Panel</span>
  <div class="nav-spacer"></div>
  <span class="nav-badge">Admin</span>
  <span class="nav-user">Dr. Hassan Benmoussa</span>
  <button class="nav-signout">Sign out</button>
</nav>

<!-- ─── Layout ─── -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-section">Overview</div>
    <a class="sb-item active" data-page="overview" onclick="navTo('overview',this)">
      <svg class="sb-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span class="sb-label">Dashboard</span>
    </a>
    <div class="sb-section">Management</div>
    <a class="sb-item" data-page="staff" onclick="navTo('staff',this)">
      <svg class="sb-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="sb-label">Staff</span>
    </a>
    <a class="sb-item" data-page="presence" onclick="navTo('presence',this)">
      <svg class="sb-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="sb-label">Presence</span>
    </a>
    <a class="sb-item" data-page="log" onclick="navTo('log',this)">
      <svg class="sb-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span class="sb-label">Activity Log</span>
    </a>
    <a class="sb-item" data-page="messages" onclick="navTo('messages',this)">
      <svg class="sb-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="sb-label">Messages</span>
      <span class="sb-badge">2</span>
    </a>
    <div class="sidebar-footer">
      <div class="sf-card">
        <div class="sf-label">Today</div>
        <div class="sf-val" id="sb-date">—</div>
        <div class="sf-sub" id="sb-time">—</div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main" id="main-content">
    <!-- filled by JS -->
  </div>

</div>

<!-- ─── Staff modal ─── -->
<div class="modal-bg" id="staff-modal">
  <div class="modal-card">
    <div class="modal-head">
      <div class="modal-title" id="sm-title">Add staff member</div>
      <button class="modal-close" onclick="closeStaffModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="sm-body">
      <div class="staff-detail-grid">
        <div class="field-wrap" style="grid-column:span 2">
          <label class="field-label">Full name</label>
          <input class="field-input" id="sm-name" placeholder="First and last name">
        </div>
        <div class="field-wrap">
          <label class="field-label">Staff ID</label>
          <input class="field-input" id="sm-sid" placeholder="e.g. DR001">
        </div>
        <div class="field-wrap">
          <label class="field-label">Role</label>
          <select class="field-select" id="sm-role">
            <option value="doctor">Doctor</option>
            <option value="secretary">Secretary</option>
            <option value="specialist">Specialist</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="field-wrap" style="grid-column:span 2">
          <label class="field-label">Office / Specialty</label>
          <input class="field-input" id="sm-office" placeholder="ER-A, Cardiology, Radiology…">
        </div>
        <div class="section-divider" style="grid-column:span 2" id="sm-cred-divider">Account credentials</div>
        <div class="field-wrap" id="sm-pw-wrap">
          <label class="field-label">Password</label>
          <input class="field-input" id="sm-pw" type="password" placeholder="Set password">
        </div>
        <div class="field-wrap" id="sm-pw2-wrap">
          <label class="field-label">Confirm password</label>
          <input class="field-input" id="sm-pw2" type="password" placeholder="Confirm">
        </div>
        <div class="field-wrap">
          <label class="field-label">PIN (4 digits)</label>
          <input class="field-input" id="sm-pin" placeholder="e.g. 7423" maxlength="4">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeStaffModal()">Cancel</button>
      <button class="btn-primary" onclick="saveStaff()">Save staff member</button>
    </div>
  </div>
</div>

<script src="/sahm-app/backend/admin.js"></script>
</body>
</html>
