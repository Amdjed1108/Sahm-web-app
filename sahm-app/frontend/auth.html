<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHM — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Backgrounds */
  --bg:#EAECF0;--surface:#FFFFFF;--s2:#F9FAFB;--s3:#F3F4F6;
  /* Borders */
  --border:#E5E7EB;--border2:#D1D5DB;
  /* Text */
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  /* Shadows */
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-md:0 8px 24px rgba(0,0,0,.1),0 3px 8px rgba(0,0,0,.06);
  --shadow-xl:0 20px 60px rgba(0,0,0,.18),0 8px 20px rgba(0,0,0,.08);
  /* Triage */
  --crit:#DC2626;--crit-mid:#EF4444;--crit-bg:#FEF2F2;--crit-br:#FECACA;
  --urg:#D97706;--urg-mid:#F59E0B;--urg-bg:#FFFBEB;--urg-br:#FDE68A;
  --stab:#059669;--stab-mid:#10B981;--stab-bg:#ECFDF5;--stab-br:#A7F3D0;
  /* Accents */
  --blue:#2563EB;--blue-dark:#1d4ed8;--blue-bg:#EFF6FF;--blue-br:#BFDBFE;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-br:#DDD6FE;
  /* Radius */
  --r:12px;--r-sm:8px;--r-lg:18px;
  /* Login-specific */
  --navy:#0C1520;
}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}

/* ── Layout shell ── */
.layout{display:flex;height:100vh;width:100vw;overflow:hidden}

/* ── LEFT PANEL ── */
.left{
  flex:0 0 58%;width:58%;height:100%;
  position:relative;
  background:var(--navy);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
}
canvas{position:absolute;inset:0;width:100%;height:100%}
.grain{position:absolute;inset:0;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px}
.left::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 28%,rgba(6,10,18,.78) 100%);
}
.left-content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;color:#fff;
  padding:0 56px;
  margin-top:-18vh;
  user-select:none;
}

/* ── RIGHT PANEL ── */
.right{
  flex:0 0 42%;width:42%;height:100%;
  background:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 56px;
  position:relative;
  box-shadow:-1px 0 0 #E5E7EB;
}

/* Arabic */
.arabic-block{direction:rtl;margin-bottom:24px;opacity:0;transform:translateY(-8px);animation:sUp .65s cubic-bezier(.22,1,.36,1) .3s forwards}
.basmala{font-family:'Noto Naskh Arabic',serif;font-size:28px;font-weight:600;color:rgba(255,255,255,.9);line-height:2}
.salam{font-family:'Noto Naskh Arabic',serif;font-size:17px;font-weight:400;color:rgba(255,255,255,.35);line-height:2}

.h-div{width:1px;height:30px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.12),transparent);margin:0 auto 22px;opacity:0;animation:sUp .4s ease .78s forwards}

/* Logo */
.logo-block{margin-bottom:0;opacity:0;transform:translateY(6px);animation:sUp .65s cubic-bezier(.22,1,.36,1) .92s forwards}
.logo-row{display:inline-flex;align-items:flex-start}
.ll{display:inline-block;font-size:72px;font-weight:700;letter-spacing:10px;line-height:1;
  opacity:0;transform:translateY(-20px) scaleY(1.08);animation:lDrop .48s cubic-bezier(.22,1,.36,1) forwards}
.ll:nth-child(1){animation-delay:.98s}
.ll:nth-child(2){animation-delay:1.12s}
.ll:nth-child(3){animation-delay:1.26s}
.ll:nth-child(4){animation-delay:1.40s;margin-right:5px}
@keyframes lDrop{to{opacity:1;transform:translateY(0) scaleY(1)}}
.vital-dot{width:9px;height:9px;background:#EF4444;border-radius:50%;margin-top:12px;margin-left:2px;flex-shrink:0;
  opacity:0;animation:vFade .22s ease 1.58s forwards,vPulse 2.4s ease-in-out 2s infinite}
@keyframes vFade{to{opacity:1}}
@keyframes vPulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 9px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}

.logo-line{height:1px;background:linear-gradient(90deg,transparent,rgba(37,99,235,.5),transparent);
  width:0;margin:10px auto 0;animation:lineGrow .42s ease-out 1.64s forwards}
@keyframes lineGrow{from{width:0}to{width:220px}}

.logo-sub{margin-top:12px}
.logo-arabic{font-family:'Noto Naskh Arabic',serif;font-size:19px;font-weight:500;color:rgba(255,255,255,.26);direction:rtl;display:block}
.logo-tagline{font-size:9px;font-weight:600;color:rgba(255,255,255,.18);letter-spacing:4px;text-transform:uppercase;display:block;margin-top:11px}

/* Bottom chips */
.chips{
  position:absolute;bottom:36px;left:0;right:0;
  display:flex;justify-content:center;gap:16px;
  opacity:0;animation:sUp .5s ease 1.9s forwards;
  z-index:10;
}
.chip{
  font-size:9.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  color:rgba(255,255,255,.22);padding:5px 12px;
  border:1px solid rgba(255,255,255,.09);border-radius:20px;
}


/* Form block */
.form-block{width:100%;max-width:320px;opacity:0;transform:translateY(10px);animation:sUp .7s cubic-bezier(.22,1,.36,1) 1.1s forwards}
@keyframes sUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.form-head{margin-bottom:32px}
.form-title{font-size:22px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:6px}
.form-sub{font-size:13px;font-weight:400;color:var(--text3)}

/* Fields — light theme */
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.6px;color:var(--text2);margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap svg.ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none;transition:color .16s}
.input-wrap:focus-within svg.ico{color:var(--blue)}
input{
  width:100%;height:42px;
  background:#fff;border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13.5px;
  padding:0 13px 0 38px;outline:none;
  transition:border .15s,box-shadow .15s;
}
input::placeholder{color:var(--text3);font-size:13px}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text3);
  padding:4px;display:flex;align-items:center;transition:color .15s}
.pw-toggle:hover{color:var(--text2)}

/* Button */
.btn{
  width:100%;height:42px;margin-top:4px;
  background:var(--blue);color:#fff;border:none;border-radius:9px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .12s,box-shadow .15s,background .15s;
  box-shadow:0 2px 14px rgba(37,99,235,.3);
}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 55%);pointer-events:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(37,99,235,.45);background:var(--blue-dark)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-text{transition:opacity .12s}
.btn-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .12s}
.btn.loading .btn-text{opacity:0}.btn.loading .btn-loader{opacity:1}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .62s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.err{font-size:11.5px;color:#DC2626;margin-top:10px;text-align:left;min-height:15px;
  opacity:0;transform:translateY(-3px);transition:opacity .15s,transform .15s}
.err.show{opacity:1;transform:translateY(0)}

/* Left footer */
.left-footer{
  position:absolute;bottom:28px;left:0;right:0;
  text-align:center;z-index:10;
  font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.5px;
  opacity:0;animation:sUp .4s ease 1.8s forwards;
}

/* Form subtitle */
.form-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}

/* Error message */
.err{
  font-size:12px;color:#DC2626;margin-top:10px;
  min-height:16px;text-align:left;
  opacity:0;transform:translateY(-3px);
  transition:opacity .16s,transform .16s;
}
.err.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div class="layout">

  <!-- LEFT — animated brand panel -->
  <div class="left">
    <canvas id="bg"></canvas>
    <div class="grain"></div>

    <div class="left-content">
      <div class="arabic-block">
        <div class="basmala">بِسْمِ اللَّهِ الرَّحْمَانِ الرَّحِيمِ</div>
        <div class="salam">السَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ</div>
      </div>
      <div class="h-div"></div>
      <div class="logo-block">
        <div class="logo-row">
          <span class="ll">S</span><span class="ll">A</span><span class="ll">H</span><span class="ll">M</span>
          <span class="vital-dot"></span>
        </div>
        <div class="logo-line"></div>
        <div class="logo-sub">
          <span class="logo-arabic">سَهْم</span>
          <span class="logo-tagline">Emergency Diagnostic Intelligence</span>
        </div>
      </div>
    </div>


    <div class="left-footer">Pixel Med Hackathon 2026 &middot; Algeria &middot; Team SAHM</div>
  </div>
  <div class="right">
    <div class="form-block">
      <div class="form-sub">Sign in with your staff credentials to continue</div>

      <div class="field">
        <label for="sid">Staff ID</label>
        <div class="input-wrap">
          <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="sid" type="text" placeholder="Enter your staff ID" autocomplete="username" spellcheck="false">
        </div>
      </div>

      <div class="field">
        <label for="pw">Password</label>
        <div class="input-wrap">
          <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="pw-toggle" id="pwt" type="button" aria-label="Toggle visibility">
            <svg id="eye" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn" id="sb" type="button">
        <span class="btn-text">Sign in</span>
        <span class="btn-loader"><span class="spinner"></span></span>
      </button>
      <div class="err" id="err"></div>
    </div>
  </div>
</div>

<script src="/sahm-app/backend/auth.js">
  /* ─── Canvas — confined to left panel ─── */
(function () {
    const canvas = document.getElementById('bg');
    const ctx    = canvas.getContext('2d');
    const left   = document.querySelector('.left');
    let W, H;
  
    function resize() {
      const r = left.getBoundingClientRect();
      W = canvas.width  = r.width;
      H = canvas.height = r.height;
    }
    addEventListener('resize', resize); resize();
  
    /* ─ Particles — slow random drift, scatter across full panel ─ */
    const COLS = ['37,99,235','78,110,245','150,175,255'];
    class Particle {
      constructor(instant) { this.init(instant); }
      init(instant) {
        /* spawn anywhere across the full panel */
        this.x = Math.random() * W;
        this.y = instant ? Math.random() * H : (Math.random() < 0.5 ? -8 : H + 8);
        /* slow drift in any direction */
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.12 + Math.random() * 0.22;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.trail = [];
        this.trailLen = 20 + Math.floor(Math.random() * 16);
        this.life = instant ? Math.floor(Math.random() * 280) : 0;
        this.maxLife = 300 + Math.floor(Math.random() * 280);
        this.r = 1.0 + Math.random() * 1.5;
        this.col = COLS[Math.floor(Math.random() * COLS.length)];
      }
      get a() {
        return Math.min(this.life / 50, (this.maxLife - this.life) / 50, 1) * 0.82;
      }
      step() {
        this.trail.unshift({x:this.x, y:this.y});
        if (this.trail.length > this.trailLen) this.trail.pop();
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        /* reset when off any edge or life ends */
        const offEdge = this.x < -12 || this.x > W + 12 || this.y < -12 || this.y > H + 12;
        if (offEdge || this.life >= this.maxLife) this.init(false);
      }
      draw() {
        const a = this.a; if (a < 0.01) return;
        for (let i = 1; i < this.trail.length; i++) {
          const f = 1 - i / this.trail.length;
          ctx.beginPath();
          ctx.arc(this.trail[i].x, this.trail[i].y, Math.max(0.25, this.r * f * 0.5), 0, Math.PI*2);
          ctx.fillStyle = `rgba(${this.col},${a * f * 0.5})`; ctx.fill();
        }
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 5);
        g.addColorStop(0, `rgba(${this.col},${a * 0.46})`);
        g.addColorStop(1, `rgba(${this.col},0)`);
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r * 5, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(215,228,255,${a * 0.9})`; ctx.fill();
      }
    }
    const pts = Array.from({length:26}, () => new Particle(true));
  
    /* ─ ECG tracer ─ */
    const TRACER = (() => {
      const SHAPES = [
        {w:205,pts:[[0,0],[18,0],[23,.24],[28,0],[42,0],[45,-.52],[47,4.4],[51,-1.2],[59,0],[72,0],[85,.62],[97,0],[125,0]]},
        {w:175,pts:[[0,0],[50,0],[52,-.4],[53,9.2],[55,-2.8],[60,0],[120,0]]},
        {w:195,pts:[[0,0],[22,0],[26,-.18],[31,0],[43,0],[45,.55],[47,-5.1],[51,1.6],[59,0],[72,0],[84,-.58],[95,0],[120,0]]},
        {w:230,pts:[[0,0],[28,0],[40,1.2],[52,2.8],[64,3.6],[76,2.8],[88,.8],[100,0],[116,0],[132,.72],[146,0],[170,0]]},
        {w:185,pts:[[0,0],[24,0],[30,3.0],[38,0],[44,-3.2],[52,0],[66,0],[80,.4],[90,0],[110,0]]},
        {w:115,pts:[[0,0],[8,1.6],[16,-.4],[24,1.4],[32,-.4],[40,1.5],[48,-.4],[52,3.8],[56,-1.2],[62,0],[75,0]]},
        {w:240,pts:[[0,0],[100,0],[104,-.25],[106,4.8],[109,-1.0],[114,0],[200,0]]},
      ];
      let track=[], headX=-340, prev=null;
      const SPEED=58, TRAIL_PX=300, STEPS=130;
  
      function buildTrack() {
        track=[]; let cx=-TRAIL_PX-60, last=null;
        while (cx < W+220) {
          const pool = last ? SHAPES.filter(s=>s!==last) : SHAPES;
          const s = pool[Math.floor(Math.random()*pool.length)];
          track.push({startX:cx,shape:s}); cx+=s.w; last=s;
        }
      }
      function getY(px) {
        const baseY=H*0.768, amp=H*0.021;
        for (let i=0;i<track.length;i++) {
          const end=(i+1<track.length)?track[i+1].startX:track[i].startX+track[i].shape.w;
          if (px>=track[i].startX&&px<end) {
            const bx=px-track[i].startX, pts=track[i].shape.pts;
            for (let j=0;j<pts.length-1;j++) {
              if (bx>=pts[j][0]&&bx<=pts[j+1][0]) {
                const t=(bx-pts[j][0])/(pts[j+1][0]-pts[j][0]);
                return baseY+amp*(pts[j][1]+t*(pts[j+1][1]-pts[j][1]));
              }
            }
            return baseY;
          }
        }
        return baseY;
      }
      buildTrack();
      function tick(now) {
        if (!prev){prev=now;return;}
        const dt=Math.min(now-prev,60); prev=now;
        headX+=SPEED*dt/1000;
        if (headX>W+60){headX=-TRAIL_PX;buildTrack();}
      }
      function draw() {
        if (!track.length) return;
        const tailX=headX-TRAIL_PX;
        for (let i=0;i<STEPS;i++) {
          const ta=i/STEPS, tb=(i+1)/STEPS;
          const xa=tailX+TRAIL_PX*ta, xb=tailX+TRAIL_PX*tb;
          if (xb<0||xa>W) continue;
          ctx.beginPath();
          ctx.moveTo(xa,getY(xa)); ctx.lineTo(xb,getY(xb));
          ctx.strokeStyle=`rgba(37,99,235,${Math.pow(ta,1.5)*0.42})`;
          ctx.lineWidth=0.55+ta*1.15;
          ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
        }
      }
      return {tick,draw};
    })();
  
    /* ─ Decorative ─ */
    function grid() {
      ctx.strokeStyle='rgba(255,255,255,.016)'; ctx.lineWidth=1;
      for (let x=0;x<W;x+=74){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
      for (let y=0;y<H;y+=74){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    }
    function rings() {
      for (let i=1;i<=7;i++){
        ctx.beginPath();ctx.arc(W,0,(i/7)*W*0.9,0,Math.PI*2);
        ctx.strokeStyle=`rgba(37,99,235,${0.022+i*0.004})`;ctx.lineWidth=1;ctx.stroke();
      }
      for (let i=1;i<=5;i++){
        ctx.beginPath();ctx.arc(0,H,(i/5)*W*0.55,-Math.PI/2,0);
        ctx.strokeStyle=`rgba(124,58,237,${0.02+i*0.005})`;ctx.lineWidth=1;ctx.stroke();
      }
    }
    const cpts=[[.14,.17],[.82,.13],[.76,.83],[.18,.80],[.90,.47]];
    function crosses(now) {
      cpts.forEach(([fx,fy],i)=>{
        const a=0.045+0.022*Math.sin(now*0.00038+i*1.28),s=7;
        const cx=fx*W,cy=fy*H;
        ctx.strokeStyle=`rgba(37,99,235,${a})`;ctx.lineWidth=1.1;
        ctx.beginPath();ctx.moveTo(cx-s,cy);ctx.lineTo(cx+s,cy);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx,cy-s);ctx.lineTo(cx,cy+s);ctx.stroke();
      });
    }
  
    function frame(now) {
      ctx.clearRect(0,0,W,H);
      grid(); rings(); crosses(now);
      pts.forEach(p=>{p.step();p.draw();});
      TRACER.tick(now); TRACER.draw();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();
  
  /* ─── Password toggle ─── */
  const pwI=document.getElementById('pw'),pwtBtn=document.getElementById('pwt'),eyeEl=document.getElementById('eye');
  pwtBtn.onclick=()=>{
    const show=pwI.type==='password'; pwI.type=show?'text':'password';
    eyeEl.innerHTML=show
      ?'<line x1="1" y1="1" x2="23" y2="23"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M1 12s4-8 11-8"/>'
      :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  };
  
  /* ─── Sign in ─── */
  const sb=document.getElementById('sb'),errEl=document.getElementById('err');
  const sidEl=document.getElementById('sid');
  
  function fieldError(el,on){
    el.style.borderColor = on ? '#DC2626' : '';
    el.style.boxShadow  = on ? '0 0 0 3px rgba(220,38,38,.12)' : '';
  }
  
  sidEl.addEventListener('input',()=>fieldError(sidEl,false));
  pwI.addEventListener('input',()=>fieldError(pwI,false));
  
  sb.onclick=async()=>{
    const id=sidEl.value.trim(), pw=pwI.value;
    /* Clear previous state */
    errEl.classList.remove('show');
    fieldError(sidEl,false); fieldError(pwI,false);
  
    /* Validate empty */
    let hasErr=false;
    if (!id){ fieldError(sidEl,true); hasErr=true; }
    if (!pw){ fieldError(pwI,true);  hasErr=true; }
    if (hasErr){ showErr(!id&&!pw?'Staff ID and password are required.':!id?'Staff ID is required.':'Password is required.'); return; }
  
    sb.classList.add('loading'); sb.disabled=true;
    await new Promise(r=>setTimeout(r,1400));
    sb.classList.remove('loading'); sb.disabled=false;
    fieldError(sidEl,true); fieldError(pwI,true);
    showErr('Incorrect Staff ID or password. Please try again.');
  };
  
  function showErr(m){
    errEl.textContent = m;
    void errEl.offsetWidth;
    errEl.classList.add('show');
    const b = document.querySelector('.form-block');
    /* Lock current visible state before resetting animation */
    b.style.opacity   = '1';
    b.style.transform = 'translateY(0)';
    b.style.animation = 'none';
    requestAnimationFrame(() => { b.style.animation = 'shake .3s ease'; });
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')sb.click();});
  const sty=document.createElement('style');
  sty.textContent='@keyframes shake{0%,100%{transform:translateX(0)}22%{transform:translateX(-5px)}44%{transform:translateX(5px)}66%{transform:translateX(-3px)}88%{transform:translateX(3px)}}';
  document.head.appendChild(sty);
</script>
</body>
</html>
