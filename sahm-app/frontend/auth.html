<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAHM — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Backgrounds */
  --bg:#EAECF0;--surface:#FFFFFF;--s2:#F9FAFB;--s3:#F3F4F6;
  /* Borders */
  --border:#E5E7EB;--border2:#D1D5DB;
  /* Text */
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  /* Shadows */
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-md:0 8px 24px rgba(0,0,0,.1),0 3px 8px rgba(0,0,0,.06);
  --shadow-xl:0 20px 60px rgba(0,0,0,.18),0 8px 20px rgba(0,0,0,.08);
  /* Triage */
  --crit:#DC2626;--crit-mid:#EF4444;--crit-bg:#FEF2F2;--crit-br:#FECACA;
  --urg:#D97706;--urg-mid:#F59E0B;--urg-bg:#FFFBEB;--urg-br:#FDE68A;
  --stab:#059669;--stab-mid:#10B981;--stab-bg:#ECFDF5;--stab-br:#A7F3D0;
  /* Accents */
  --blue:#2563EB;--blue-dark:#1d4ed8;--blue-bg:#EFF6FF;--blue-br:#BFDBFE;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-br:#DDD6FE;
  /* Radius */
  --r:12px;--r-sm:8px;--r-lg:18px;
  /* Login-specific */
  --navy:#0C1520;
}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden}

/* ── Layout shell ── */
.layout{display:flex;height:100vh;width:100vw;overflow:hidden}

/* ── LEFT PANEL ── */
.left{
  flex:0 0 58%;width:58%;height:100%;
  position:relative;
  background:var(--navy);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
}
canvas{position:absolute;inset:0;width:100%;height:100%}
.grain{position:absolute;inset:0;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px}
.left::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 28%,rgba(6,10,18,.78) 100%);
}
.left-content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;color:#fff;
  padding:0 56px;
  margin-top:-18vh;
  user-select:none;
}

/* ── RIGHT PANEL ── */
.right{
  flex:0 0 42%;width:42%;height:100%;
  background:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 56px;
  position:relative;
  box-shadow:-1px 0 0 #E5E7EB;
}

/* Arabic */
.arabic-block{direction:rtl;margin-bottom:24px;opacity:0;transform:translateY(-8px);animation:sUp .65s cubic-bezier(.22,1,.36,1) .3s forwards}
.basmala{font-family:'Noto Naskh Arabic',serif;font-size:28px;font-weight:600;color:rgba(255,255,255,.9);line-height:2}
.salam{font-family:'Noto Naskh Arabic',serif;font-size:17px;font-weight:400;color:rgba(255,255,255,.35);line-height:2}

.h-div{width:1px;height:30px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.12),transparent);margin:0 auto 22px;opacity:0;animation:sUp .4s ease .78s forwards}

/* Logo */
.logo-block{margin-bottom:0;opacity:0;transform:translateY(6px);animation:sUp .65s cubic-bezier(.22,1,.36,1) .92s forwards}
.logo-row{display:inline-flex;align-items:flex-start}
.ll{display:inline-block;font-size:72px;font-weight:700;letter-spacing:10px;line-height:1;
  opacity:0;transform:translateY(-20px) scaleY(1.08);animation:lDrop .48s cubic-bezier(.22,1,.36,1) forwards}
.ll:nth-child(1){animation-delay:.98s}
.ll:nth-child(2){animation-delay:1.12s}
.ll:nth-child(3){animation-delay:1.26s}
.ll:nth-child(4){animation-delay:1.40s;margin-right:5px}
@keyframes lDrop{to{opacity:1;transform:translateY(0) scaleY(1)}}
.vital-dot{width:9px;height:9px;background:#EF4444;border-radius:50%;margin-top:12px;margin-left:2px;flex-shrink:0;
  opacity:0;animation:vFade .22s ease 1.58s forwards,vPulse 2.4s ease-in-out 2s infinite}
@keyframes vFade{to{opacity:1}}
@keyframes vPulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 9px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}

.logo-line{height:1px;background:linear-gradient(90deg,transparent,rgba(37,99,235,.5),transparent);
  width:0;margin:10px auto 0;animation:lineGrow .42s ease-out 1.64s forwards}
@keyframes lineGrow{from{width:0}to{width:220px}}

.logo-sub{margin-top:12px}
.logo-arabic{font-family:'Noto Naskh Arabic',serif;font-size:19px;font-weight:500;color:rgba(255,255,255,.26);direction:rtl;display:block}
.logo-tagline{font-size:9px;font-weight:600;color:rgba(255,255,255,.18);letter-spacing:4px;text-transform:uppercase;display:block;margin-top:11px}

/* Bottom chips */
.chips{
  position:absolute;bottom:36px;left:0;right:0;
  display:flex;justify-content:center;gap:16px;
  opacity:0;animation:sUp .5s ease 1.9s forwards;
  z-index:10;
}
.chip{
  font-size:9.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  color:rgba(255,255,255,.22);padding:5px 12px;
  border:1px solid rgba(255,255,255,.09);border-radius:20px;
}


/* Form block */
.form-block{width:100%;max-width:320px;opacity:0;transform:translateY(10px);animation:sUp .7s cubic-bezier(.22,1,.36,1) 1.1s forwards}
@keyframes sUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.form-head{margin-bottom:32px}
.form-title{font-size:22px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:6px}
.form-sub{font-size:13px;font-weight:400;color:var(--text3)}

/* Fields — light theme */
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.6px;color:var(--text2);margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap svg.ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none;transition:color .16s}
.input-wrap:focus-within svg.ico{color:var(--blue)}
input{
  width:100%;height:42px;
  background:#fff;border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13.5px;
  padding:0 13px 0 38px;outline:none;
  transition:border .15s,box-shadow .15s;
}
input::placeholder{color:var(--text3);font-size:13px}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text3);
  padding:4px;display:flex;align-items:center;transition:color .15s}
.pw-toggle:hover{color:var(--text2)}

/* Button */
.btn{
  width:100%;height:42px;margin-top:4px;
  background:var(--blue);color:#fff;border:none;border-radius:9px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .12s,box-shadow .15s,background .15s;
  box-shadow:0 2px 14px rgba(37,99,235,.3);
}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 55%);pointer-events:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(37,99,235,.45);background:var(--blue-dark)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-text{transition:opacity .12s}
.btn-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .12s}
.btn.loading .btn-text{opacity:0}.btn.loading .btn-loader{opacity:1}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .62s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.err{font-size:11.5px;color:#DC2626;margin-top:10px;text-align:left;min-height:15px;
  opacity:0;transform:translateY(-3px);transition:opacity .15s,transform .15s}
.err.show{opacity:1;transform:translateY(0)}

/* Left footer */
.left-footer{
  position:absolute;bottom:28px;left:0;right:0;
  text-align:center;z-index:10;
  font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.5px;
  opacity:0;animation:sUp .4s ease 1.8s forwards;
}

/* Form subtitle */
.form-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}

/* Error message */
.err{
  font-size:12px;color:#DC2626;margin-top:10px;
  min-height:16px;text-align:left;
  opacity:0;transform:translateY(-3px);
  transition:opacity .16s,transform .16s;
}
.err.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div class="layout">

  <!-- LEFT — animated brand panel -->
  <div class="left">
    <canvas id="bg"></canvas>
    <div class="grain"></div>

    <div class="left-content">
      <div class="arabic-block">
        <div class="basmala">بِسْمِ اللَّهِ الرَّحْمَانِ الرَّحِيمِ</div>
        <div class="salam">السَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ</div>
      </div>
      <div class="h-div"></div>
      <div class="logo-block">
        <div class="logo-row">
          <span class="ll">S</span><span class="ll">A</span><span class="ll">H</span><span class="ll">M</span>
          <span class="vital-dot"></span>
        </div>
        <div class="logo-line"></div>
        <div class="logo-sub">
          <span class="logo-arabic">سَهْم</span>
          <span class="logo-tagline">Emergency Diagnostic Intelligence</span>
        </div>
      </div>
    </div>


    <div class="left-footer">Pixel Med Hackathon 2026 &middot; Algeria &middot; Team SAHM</div>
  </div>
  <div class="right">
    <div class="form-block">
      <div class="form-sub">Sign in with your staff credentials to continue</div>

      <div class="field">
        <label for="sid">Staff ID</label>
        <div class="input-wrap">
          <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="sid" type="text" placeholder="Enter your staff ID" autocomplete="username" spellcheck="false">
        </div>
      </div>

      <div class="field">
        <label for="pw">Password</label>
        <div class="input-wrap">
          <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="pw-toggle" id="pwt" type="button" aria-label="Toggle visibility">
            <svg id="eye" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn" id="sb" type="button">
        <span class="btn-text">Sign in</span>
        <span class="btn-loader"><span class="spinner"></span></span>
      </button>
      <div class="err" id="err"></div>
    </div>
  </div>
</div>

<script src="/sahm-app/backend/auth.js"></script>
</body>
</html>
